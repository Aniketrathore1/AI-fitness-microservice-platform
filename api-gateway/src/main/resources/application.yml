server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: userservice-route
          uri: lb://userservice
          predicates:
            - Path=/api/users/**


        - id: activityservice-route
          uri: lb://activityservice
          predicates:
            - Path=/api/activities/**


        - id: aiservice-route
          uri: lb://aiservice
          predicates:
            - Path=/api/ai/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
